<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OnyX Ultimate Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808; --panel: #121212; --card: #1a1a1a;
            --radius: 24px; --ts: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; padding: 20px; gap: 20px; overflow: hidden; }
        
        /* Фон-сетка */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        /* Сайдбар */
        .sidebar { width: 240px; background: var(--panel); border-radius: var(--radius); padding: 30px 20px; display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.05); }
        .logo { font-size: 26px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px; }
        .nav-item { padding: 12px 15px; margin-bottom: 8px; border-radius: 14px; color: #777; cursor: pointer; transition: 0.3s; }
        .nav-item.active, .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }

        /* Контент */
        .main { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; position: relative; }
        .tab { flex-grow: 1; display: none; animation: show var(--ts); }
        .tab.active { display: flex; flex-direction: column; gap: 20px; }
        
        @keyframes show { 
            from { opacity: 0; transform: translateY(15px); filter: blur(10px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }

        .editor-box { flex-grow: 1; background: var(--panel); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        #monaco { width: 100%; height: 100%; }

        /* Нижняя панель */
        .bottom-bar { height: 85px; background: var(--panel); border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        
        .btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); color: white; padding: 12px 20px; border-radius: 14px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 13px; }
        .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .btn-exec { background: white; color: black; border: none; }
        .btn-exec:hover { background: #eee; color: black; }

        /* Сетка для Хаба и Игр */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; overflow-y: auto; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.1); }
        .card h3 { margin-bottom: 10px; }
        .card p { color: #777; font-size: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">OnyX</div>
        <div class="nav-item active" onclick="switchTab('executor', this)">Executor</div>
        <div class="nav-item" onclick="switchTab('hub', this)">Scripts Hub</div>
        <div class="nav-item" onclick="switchTab('games', this)">Games</div>
        <div style="margin-top: auto; font-size: 10px; color: #444;">Connected to Render</div>
    </aside>

    <main class="main">
        <div id="executor" class="tab active">
            <div class="editor-box"><div id="monaco"></div></div>
            <footer class="bottom-bar">
                <div style="font-size: 12px; color: #777;">Status: <span style="color: #4CAF50; font-weight: 800;">CLOUD READY</span></div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-exec" onclick="sendScript()">Execute</button>
                    <button class="btn" onclick="editor.setValue('')">Clear</button>
                    <button class="btn">R6</button>
                    <button class="btn">Reset</button>
                </div>
            </footer>
        </div>

        <div id="hub" class="tab">
            <h2 style="margin-bottom: 10px;">Scripts Hub</h2>
            <div class="grid">
                <div class="card">
                    <h3>Dream V2</h3>
                    <p>Universal visual enhancements and character modifications.</p>
                    <button class="btn btn-exec" style="width: 100%;">Load Script</button>
                </div>
            </div>
        </div>

        <div id="games" class="tab">
            <h2 style="margin-bottom: 10px;">Games Manager</h2>
            <div class="grid">
                <div class="card">
                    <div style="font-size: 32px; margin-bottom: 10px;">⚔️</div>
                    <h3>Blox Fruits</h3>
                    <p>Status: <span style="color: #4CAF50;">Online</span></p>
                    <button class="btn" style="width: 100%;">Connect Server</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        let editor;
        const RENDER_URL = "https://onyxwbserver.onrender.com";

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        require(['vs/editor/editor.main'], () => {
            editor = monaco.editor.create(document.getElementById('monaco'), {
                value: '-- OnyX Cloud Executor\nprint("Script system active")',
                language: 'lua', theme: 'vs-dark', automaticLayout: true,
                cursorSmoothCaretAnimation: "on", fontSize: 15, fontFamily: 'JetBrains Mono',
                minimap: { enabled: false }, padding: { top: 20 }
            });
            monaco.editor.defineTheme('onyx', { base: 'vs-dark', inherit: true, rules: [], colors: { 'editor.background': '#121212' } });
            monaco.editor.setTheme('onyx');
        });

        function switchTab(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'executor' && editor) setTimeout(() => editor.layout(), 100);
        }

        async function sendScript() {
            const code = editor.getValue();
            try {
                const res = await fetch(`${RENDER_URL}/update_script`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: code
                });
                if(res.ok) alert("Успешно отправлено в Roblox!");
            } catch (e) { alert("Ошибка: Сервер Render не отвечает."); }
        }
    </script>
</body>
</html>
