<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnyX ServerSide | Web Based</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080808;
            --panel-color: #121212;
            --card-color: #1a1a1a;
            --accent-white: #ffffff;
            --text-gray: #777;
            --grid-line: rgba(255, 255, 255, 0.025);
            --border-radius: 24px;
            --transition-slow: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: white;
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 20px;
            gap: 20px;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            background: var(--panel-color);
            border-radius: var(--border-radius);
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo { font-size: 26px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px; }

        .nav-menu { flex-grow: 1; }
        .nav-item {
            display: block;
            color: var(--text-gray);
            text-decoration: none;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-item.active, .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }

        /* --- CONTENT AREA --- */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .tab-content {
            flex-grow: 1;
            display: none;
            animation: tabReveal var(--transition-slow);
        }

        .tab-content.active { display: flex; flex-direction: column; gap: 20px; }

        @keyframes tabReveal {
            from { opacity: 0; transform: translateY(15px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* --- EXECUTOR & COMMON --- */
        .editor-window {
            flex-grow: 1;
            background: var(--panel-color);
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }
        #monaco-container { width: 100%; height: 100%; }

        /* --- GRIDS (HUB & GAMES) --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            overflow-y: auto;
        }

        .card {
            background: var(--card-color);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.03);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.1); }
        .card h3 { margin-bottom: 8px; font-size: 18px; }
        .card p { color: var(--text-gray); font-size: 12px; margin-bottom: 20px; }

        .game-icon {
            width: 100%;
            height: 100px;
            background: #252525;
            border-radius: 12px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        /* --- BOTTOM BAR --- */
        .bottom-bar {
            height: 80px;
            background: var(--panel-color);
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .btn-group { display: flex; gap: 10px; }
        .action-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .action-btn:hover { background: rgba(255,255,255,0.08); }
        .btn-execute { background: white; color: black; border: none; }
        .btn-execute:hover { background: #e0e0e0; }

        .status-info { color: var(--text-gray); font-size: 12px; display: flex; gap: 15px; }
        .status-info span { color: #4CAF50; font-weight: bold; }

    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo">OnyX</div>
        <nav class="nav-menu">
            <div class="nav-item active" onclick="switchTab('executor', this)">Executor</div>
            <div class="nav-item" onclick="switchTab('hub', this)">Scripts Hub</div>
            <div class="nav-item" onclick="switchTab('games', this)">Games</div>
            <div class="nav-item">Settings</div>
        </nav>
        <div style="font-size: 11px; color: var(--text-gray);">Build: 24.03.2026</div>
    </aside>

    <main class="main-content">
        <div id="executor" class="tab-content active">
            <div class="editor-window">
                <div id="monaco-container"></div>
            </div>
            <footer class="bottom-bar">
                <div class="status-info">
                    <div>Status: <span>Ready</span></div>
                    <div>Engine: <span>OnyX v4</span></div>
                </div>
                <div class="btn-group">
                    <button class="action-btn btn-execute" onclick="executeScript()">Execute</button>
                    <button class="action-btn" onclick="clearCode()">Clear</button>
                    <button class="action-btn">R6</button>
                    <button class="action-btn">Reset</button>
                </div>
            </footer>
        </div>

        <div id="hub" class="tab-content">
            <h2 style="margin-bottom: 20px;">Scripts Hub</h2>
            <div class="grid-layout">
                <div class="card">
                    <h3>Dream V2</h3>
                    <p>Character dream effects & shaders.</p>
                    <button class="action-btn btn-execute" style="width:100%">Execute</button>
                </div>
                <div class="card">
                    <h3>Beryl Gun</h3>
                    <p>Mobile gun script system.</p>
                    <button class="action-btn btn-execute" style="width:100%">Execute</button>
                </div>
            </div>
        </div>

        <div id="games" class="tab-content">
            <h2 style="margin-bottom: 20px;">Connected Games</h2>
            <div class="grid-layout">
                <div class="card">
                    <div class="game-icon">⚔️</div>
                    <h3>Blox Fruits</h3>
                    <p>Status: <span style="color:#4CAF50">Online</span></p>
                    <button class="action-btn" style="width:100%">Connect Server</button>
                </div>
                <div class="card">
                    <div class="game-icon">🐶</div>
                    <h3>Pet Simulator 99</h3>
                    <p>Status: <span style="color:#ff4c4c">Offline</span></p>
                    <button class="action-btn" style="width:100%" disabled>Connect Server</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
    let editor;

    require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
    require(['vs/editor/editor.main'], function() {
        editor = monaco.editor.create(document.getElementById('monaco-container'), {
            value: '-- OnyX Cloud System\nprint("Connecting to Roblox...")',
            language: 'lua',
            theme: 'vs-dark',
            automaticLayout: true,
            cursorSmoothCaretAnimation: "on",
            smoothScrolling: true,
            fontSize: 15,
            fontFamily: 'JetBrains Mono',
            minimap: { enabled: false },
            padding: { top: 20 }
        });
        
        monaco.editor.defineTheme('onyx', {
            base: 'vs-dark',
            inherit: true,
            rules: [],
            colors: { 'editor.background': '#121212' }
        });
        monaco.editor.setTheme('onyx');
    });

    function switchTab(tabId, element) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        element.classList.add('active');

        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        if(tabId === 'executor' && editor) {
            setTimeout(() => editor.layout(), 100);
        }
    }

    function executeScript() {
        const code = editor.getValue();
        // ВАЖНО: GitHub Pages не может это отправить. Нужен Backend.
        console.log("Sending to Server: ", code);
        alert("Script sent to Cloud Queue!");
    }

    function clearCode() {
        if(editor) editor.setValue('');
    }
</script>

</body>
</html>
