<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnyX Ultimate Cloud</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --panel: #121212;
            --card: #1a1a1a;
            --accent: #ffffff;
            --text-gray: #777;
            --radius: 24px;
            --ts: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Фоновая сетка */
        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), 
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px; z-index: -1;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 240px;
            background: var(--panel);
            border-radius: var(--radius);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
        }

        .logo { font-size: 26px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px; }

        .nav-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 14px;
            color: var(--text-gray);
            cursor: pointer;
            transition: 0.3s;
            font-weight: 500;
        }
        .nav-item.active, .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }

        /* --- MAIN CONTENT --- */
        .main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .tab {
            flex-grow: 1;
            display: none;
            animation: tabReveal var(--ts);
        }

        .tab.active { display: flex; flex-direction: column; gap: 20px; }

        @keyframes tabReveal {
            from { opacity: 0; transform: translateY(15px); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* --- EXECUTOR --- */
        .editor-window {
            flex-grow: 1;
            background: var(--panel);
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
            overflow: hidden;
        }
        #monaco { width: 100%; height: 100%; }

        .bottom-bar {
            height: 85px;
            background: var(--panel);
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        /* --- UI ELEMENTS --- */
        .btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: white;
            padding: 12px 20px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .btn-exec { background: white; color: black; border: none; }
        .btn-exec:hover { background: #eee; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* --- GAME CARDS --- */
        .game-card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.03);
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: 0.3s;
        }
        .game-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.1); }

        .game-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .game-icon-box {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .game-title { font-weight: 800; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .game-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: rgba(0,0,0,0.25);
            padding: 12px;
            border-radius: 12px;
            font-size: 11px;
        }

        .detail-item b { color: var(--text-gray); display: block; margin-bottom: 2px; font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
        .detail-item span { color: #eee; font-weight: 600; }

        .status-badge { color: #4CAF50; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .status-badge::before { content: ""; width: 6px; height: 6px; background: #4CAF50; border-radius: 50%; display: inline-block; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">OnyX</div>
        <div class="nav-item active" onclick="switchTab('executor', this)">Executor</div>
        <div class="nav-item" onclick="switchTab('hub', this)">Scripts Hub</div>
        <div class="nav-item" onclick="switchTab('games', this)">Games Manager</div>
        <div style="margin-top: auto; font-size: 10px; color: #444;">Connected to Server</div>
    </aside>

    <main class="main">
        <div id="executor" class="tab active">
            <div class="editor-window">
                <div id="monaco"></div>
            </div>
            <footer class="bottom-bar">
                <div style="font-size: 12px; color: var(--text-gray);">
                    Status: <span style="color: #4CAF50; font-weight: 800;">CLOUD READY</span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-exec" onclick="sendScript()">Execute</button>
                    <button class="btn" onclick="editor.setValue('')">Clear</button>
                    <button class="btn">R6</button>
                    <button class="btn">Reset</button>
                </div>
            </footer>
        </div>

        <div id="hub" class="tab">
            <h2 style="margin-bottom: 10px;">Scripts Hub</h2>
            <div class="grid">
                <div class="card" style="background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.03);">
                    <h3>Dream V2</h3>
                    <p style="color: var(--text-gray); font-size: 12px; margin: 10px 0 20px;">Character effects & graphics shader system.</p>
                    <button class="btn btn-exec" style="width: 100%;">Load Script</button>
                </div>
            </div>
        </div>

        <div id="games" class="tab">
            <h2 style="margin-bottom: 10px;">Active Game Servers</h2>
            <div id="game-list" class="grid">
                <p style="color: #444; font-size: 13px;">Ожидание подключения серверов из Roblox Studio...</p>
            </div>
        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        let editor;
        const RENDER_URL = "https://onyxwbserver.onrender.com";

        // 1. Настройка Редактора
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        require(['vs/editor/editor.main'], () => {
            editor = monaco.editor.create(document.getElementById('monaco'), {
                value: '-- OnyX Cloud System\nprint("Waiting for commands...")',
                language: 'lua', theme: 'vs-dark', automaticLayout: true,
                cursorSmoothCaretAnimation: "on", fontSize: 15, fontFamily: 'JetBrains Mono',
                minimap: { enabled: false }, padding: { top: 20 }
            });
            monaco.editor.defineTheme('onyx', { base: 'vs-dark', inherit: true, rules: [], colors: { 'editor.background': '#121212' } });
            monaco.editor.setTheme('onyx');
        });

        // 2. Логика вкладок
        function switchTab(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'executor' && editor) setTimeout(() => editor.layout(), 100);
        }

        // 3. Отправка скрипта
        async function sendScript() {
            const code = editor.getValue();
            try {
                const res = await fetch(`${RENDER_URL}/update_script`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: code
                });
                if(res.ok) alert("Скрипт успешно отправлен!");
            } catch (e) { alert("Сервер Render не отвечает."); }
        }

        // 4. Получение списка игр (АВТО-КАРТОЧКИ)
        async function fetchGames() {
            try {
                const res = await fetch(`${RENDER_URL}/get_games`);
                const games = await res.json();
                const list = document.getElementById('game-list');

                if (Object.keys(games).length > 0) {
                    list.innerHTML = ""; // Убираем текст ожидания
                    for (let id in games) {
                        const g = games[id];
                        list.innerHTML += `
                            <div class="game-card">
                                <div class="game-header">
                                    <div class="game-icon-box">🎮</div>
                                    <div class="game-title">${g.gameName || 'Unknown Game'}</div>
                                </div>
                                <div class="game-details">
                                    <div class="detail-item"><b>Author</b><span>${g.author || 'N/A'}</span></div>
                                    <div class="detail-item"><b>Players</b><span>${g.playerCount || 0}/${g.maxPlayers || 0}</span></div>
                                    <div class="detail-item"><b>Place ID</b><span>${g.placeId || '0000'}</span></div>
                                    <div class="detail-item"><b>Status</b><span class="status-badge">Online</span></div>
                                </div>
                                <button class="btn btn-exec" style="width: 100%;" onclick="alert('Connected to ${g.gameName}')">Connect Server</button>
                            </div>
                        `;
                    }
                }
            } catch (e) { console.log("Searching for servers..."); }
        }

        // Запуск авто-обновления игр каждые 5 секунд
        setInterval(fetchGames, 5000);
        fetchGames(); // Первый запуск при загрузке
    </script>
</body>
</html>
