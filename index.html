<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>OnyX Cloud Executor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080808; --panel: #121212; --accent: #fff; --radius: 20px; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; padding: 20px; gap: 20px; overflow: hidden; }
        .sidebar { width: 240px; background: var(--panel); border-radius: var(--radius); padding: 30px; border: 1px solid #222; }
        .main { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }
        .editor-container { flex-grow: 1; background: var(--panel); border-radius: var(--radius); border: 1px solid #222; overflow: hidden; }
        #monaco { width: 100%; height: 100%; }
        .footer { height: 80px; background: var(--panel); border-radius: var(--radius); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; border: 1px solid #222; }
        .btn { background: white; color: black; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn:hover { transform: scale(1.05); background: #ddd; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1 style="font-size: 24px; margin-bottom: 20px;">OnyX</h1>
        <p style="font-size: 11px; color: #555;">Введите require или любой Lua код для запуска через динамический модуль.</p>
    </div>

    <div class="main">
        <div class="editor-container">
            <div id="monaco"></div>
        </div>
        <div class="footer">
            <div style="font-size: 12px; color: #444;">Status: <span style="color: #4CAF50;">CLOUD READY</span></div>
            <button class="btn" onclick="sendScript()">Execute Code</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script>
        let editor;
        const RENDER_URL = "https://onyxwbserver.onrender.com";

        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});
        require(['vs/editor/editor.main'], () => {
            editor = monaco.editor.create(document.getElementById('monaco'), {
                value: 'require(104786344839667)("Not_an9e15")',
                language: 'lua', theme: 'vs-dark', automaticLayout: true, fontSize: 14, minimap: { enabled: false }
            });
        });

        async function sendScript() {
            try {
                await fetch(`${RENDER_URL}/update_script`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: editor.getValue()
                });
                alert("Код отправлен в Roblox!");
            } catch (e) { alert("Ошибка сервера!"); }
        }
    </script>
</body>
</html>
